aid: windward-ai
name: Windward
description: >-
  Windward is a Maritime AI company headquartered in London and Washington
  D.C. delivering mission-grade, multi-source maritime intelligence for
  defense agencies, law enforcement, customs, energy and commodity traders,
  marine insurers, shippers, and financial institutions. Founded by CEO
  Ami Daniel, Windward fuses AIS data, remote sensing (EO, SAR, RF GEOINT),
  proprietary behavioral analytics, and generative AI into a single
  Maritime AI platform covering vessel screening, ownership and entity
  resolution, sanctions exposure, deceptive shipping detection, ship-to-ship
  transfer analysis, IUU fishing detection, smuggling detection, container
  tracking, and maritime infrastructure protection. Windward exposes its
  intelligence through the API Insights Lab, a unified GraphQL API at
  developer.windward.ai providing programmatic access to vessel risk
  scores, Organization Defined Risk (ODR), ultimate beneficial ownership,
  early detection signals, tracked shipments, carriers, and detention &
  demurrage data, along with webhooks and workflow automation. The company
  has no public REST/OpenAPI surface, no public SDKs, and no public GitHub
  org — its API is GraphQL-only with managed onboarding and expert-led
  implementation support.
